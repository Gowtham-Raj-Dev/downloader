name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-
      - name: Install dependencies
        run: npm ci
      - name: Create Env File
        run: |
          echo "NEXT_PUBLIC_FIREBASE_API_KEY=AIzaSyDpa36f82Q2GZfd5QFh1VIgGY2yOxSQrw8" >> .env.production
          echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=downloader.codelove.in" >> .env.production
          echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=downloader-codelove" >> .env.production
          echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=downloader-codelove.firebasestorage.app" >> .env.production
          echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=688897146777" >> .env.production
          echo "NEXT_PUBLIC_FIREBASE_APP_ID=1:688897146777:web:210f7c401bc5c14dcadd08" >> .env.production
          echo "NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=G-195MMH811B" >> .env.production
      - name: Build with Next.js
        run: npx next build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
